name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        
    - name: Run Pytest
      env:
        DATABASE_URL: "postgresql+asyncpg://dummy:dummy@localhost/dummy"
        DATABASE_URL_ASYNC: "postgresql+asyncpg://dummy:dummy@localhost/dummy"
        EMBED_MODEL_NAME: "keepitreal/vietnamese-sbert"
        GEMINI_API_KEY: "dummy"
        GEMINI_MODEL: "dummy"
        SMTP_EMAIL: "dummy@dummy.com"
        SMTP_PASSWORD: "dummy"
        google_client_id: "dummy"
        google_client_secret: "dummy"
        api_backend_domain: "http://localhost:8000"
        nextauth_url: "http://localhost:3000"
        nextauth_secret: "dummy"
        JWT_SECRET_KEY: "dummy"
      run: |
        cd backend
        # Tạo file data/word_filter.json giả (do thư mục data/ bị ignore trên Git)
        mkdir -p data
        echo '{}' > data/word_filter.json
        
        # We dummy out the EMBED_MODEL_NAME since HF models can be large for CI,
        # but since tests just check root health, we might need a mocked dependency
        # or we just let it run.
        pytest tests/

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "18"
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
        

    - name: Build project
      run: |
        cd frontend
        npm run build
